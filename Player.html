<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МаксЛэнд - IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        #video-player { width: 100%; height: 450px; background: #000; border: 2px solid #ff8c00; }
        .channel-btn { display: block; width: 100%; padding: 15px; margin-top: 10px; background: #333; border: 1px solid #ff8c00; color: white; cursor: pointer; text-align: left; }
        .channel-btn:hover { background: #ff8c00; }
    </style>
</head>
<body>

<div class="container">
    <h1>МаксЛэнд Live</h1>
    <video id="video-player" controls></video>
    <div id="playlist">Загрузка каналов...</div>
</div>

<script>
    const video = document.getElementById('video-player');
    const list = document.getElementById('playlist');
    // Ваша RAW ссылка на GitHub
    const m3uUrl = "https://raw.githubusercontent.com/PulseTV-YT/ip-tv/refs/heads/main/123.m3u";
    // Используем CORS-прокси, чтобы обойти ограничения браузера
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(m3uUrl);

    async function updatePlaylist() {
        try {
            const response = await fetch(proxy);
            const json = await response.json();
            const data = json.contents;
            
            list.innerHTML = ""; // Очищаем список
            const lines = data.split('\n');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const title = lines[i].split(',')[1];
                    const url = lines[i + 1].trim();
                    
                    const btn = document.createElement('button');
                    btn.className = 'channel-btn';
                    btn.textContent = title;
                    btn.onclick = () => {
                        play(url);
                    };
                    list.appendChild(btn);
                }
            }
        } catch (e) {
            list.innerHTML = "Ошибка загрузки: обновите страницу.";
        }
    }

    function play(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    // Загружаем список при старте
    updatePlaylist();
</script>
</body>
</html>
