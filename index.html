<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МаксЛэнд - Плеер</title>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body style="margin:0; background:#111;">

    <div id="twitch-embed"></div>

    <script>
        // Замените 'channel-name' на имя канала, который вы хотите видеть
        new Twitch.Embed("twitch-embed", {
            width: "100%",
            height: 480,
            channel: "channel-name", // УКАЖИТЕ ЗДЕСЬ ИМЯ КАНАЛА
            layout: "video",
            autoplay: true
        });
    </script>
</body>
</html>
