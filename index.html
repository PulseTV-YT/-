<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МаксЛэнд - IPTV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .video-container { width: 100%; max-width: 800px; }
        .channel-btn { width: 100%; padding: 15px; margin-top: 10px; background: #333; color: white; border: 1px solid #ff8c00; cursor: pointer; }
    </style>
</head>
<body>

    <h1>МАКСЛЭНД LIVE</h1>
    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="800" height="450"></video>
    </div>

    <div id="playlist" style="width: 800px;"></div>

<script>
    const player = videojs('my-video');
    const m3uUrl = "https://cdn.jsdelivr.net/gh/PulseTV-YT/ip-tv@main/123.m3u";

    async function loadPlaylist() {
        const response = await fetch(m3uUrl);
        const data = await response.text();
        const lines = data.split('\n');
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF')) {
                const title = lines[i].split(',')[1];
                const url = lines[i+1].trim();
                
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.textContent = title;
                btn.onclick = () => {
                    player.src({ src: url, type: 'application/x-mpegURL' });
                    player.play();
                };
                document.getElementById('playlist').appendChild(btn);
            }
        }
    }

    loadPlaylist();
</script>
</body>
</html>
