<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МаксЛэнд - Отладка</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        #debug { color: #aaa; font-family: monospace; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>МаксЛэнд Live</h1>
    <button onclick="debugPlaylist()">ПРОВЕРИТЬ ПЛЕЙЛИСТ</button>
    <div id="debug"></div>

<script>
    async function debugPlaylist() {
        const m3uUrl = "https://raw.githubusercontent.com/PulseTV-YT/ip-tv/refs/heads/main/123.m3u";
        const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(m3uUrl);
        const debugDiv = document.getElementById('debug');
        
        try {
            debugDiv.innerText = "Скачиваю...";
            const response = await fetch(proxy);
            const data = await response.text();
            
            debugDiv.innerText = "ФАЙЛ ПОЛУЧЕН:\n" + data; // Вывод всего, что пришло
            
            if (data.includes("Седьмой канал")) {
                alert("Фраза найдена!");
            } else {
                alert("Фраза 'Седьмой канал' НЕ найдена в тексте.");
            }
        } catch (e) {
            debugDiv.innerText = "Ошибка: " + e.message;
        }
    }
</script>
</body>
</html>
