<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МаксЛэнд - Плеер</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #video-player { width: 100%; max-width: 800px; height: 450px; background: #000; border: 2px solid #ff8c00; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>МАКСЛЭНД LIVE</h1>
    <video id="video-player" controls autoplay></video>
    <div class="controls" id="status">Загрузка данных...</div>

<script>
    const video = document.getElementById('video-player');
    const status = document.getElementById('status');
    const m3uUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://raw.githubusercontent.com/PulseTV-YT/ip-tv/refs/heads/main/123.m3u");

    async function init() {
        try {
            const response = await fetch(m3uUrl);
            let data = await response.text();
            
            // Убираем скрытые символы и приводим к нижнему регистру для поиска
            const lines = data.split('\n');
            let foundUrl = "";

            for (let i = 0; i < lines.length; i++) {
                // Ищем только по слову "седьмой", это надежнее
                if (lines[i].toLowerCase().includes("седьмой")) {
                    foundUrl = lines[i + 1].trim();
                    status.innerText = "Канал найден: " + lines[i].replace('#EXTINF:-1,', '');
                    break;
                }
            }

            if (foundUrl) {
                playVideo(foundUrl);
            } else {
                status.innerText = "Ошибка: канал 'Седьмой' не найден. Проверь файл на GitHub.";
            }
        } catch (e) {
            status.innerText = "Ошибка загрузки: " + e.message;
        }
    }

    function playVideo(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    init();
</script>
</body>
</html>
